openapi: 3.0.1
info:
  title: Catalog API
  version: 1.0.0
  description: |
    Product catalog API with subscription-based access control.

    An **API key** (`X-API-Key` header) is required on every request. Subscribe to
    a Gold or Bronze plan in the developer portal — no subscription token header
    is needed; the gateway validates your plan via the API key alone.
servers:
  - url: /catalog
security:
  - ApiKeyHeader: []
components:
  securitySchemes:
    ApiKeyHeader:
      type: apiKey
      in: header
      name: X-API-Key
  schemas:
    Product:
      type: object
      properties:
        productId:
          type: string
          example: prod-00456
        name:
          type: string
          example: Wireless Headphones
        description:
          type: string
          example: Over-ear noise-cancelling wireless headphones
        price:
          type: number
          format: float
          example: 149.99
        categoryId:
          type: string
          example: cat-electronics
        inStock:
          type: boolean
          example: true
      required:
        - productId
        - name
        - price
        - categoryId
    Category:
      type: object
      properties:
        categoryId:
          type: string
          example: cat-electronics
        name:
          type: string
          example: Electronics
        description:
          type: string
          example: Consumer electronics and accessories
      required:
        - categoryId
        - name
    Error:
      type: object
      properties:
        code:
          type: integer
          format: int32
        message:
          type: string
      required:
        - code
        - message

paths:
  /products:
    get:
      summary: List all products
      description: Returns a paginated list of products in the catalog.
      operationId: listProducts
      tags:
        - products
      parameters:
        - name: categoryId
          in: query
          required: false
          description: Filter products by category.
          schema:
            type: string
        - name: limit
          in: query
          required: false
          description: Maximum number of products to return.
          schema:
            type: integer
            default: 20
      responses:
        '200':
          description: OK. List of products.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Product'

  /products/{productId}:
    get:
      summary: Get a product
      description: Returns full details of a single product by ID.
      operationId: getProduct
      tags:
        - products
      parameters:
        - name: productId
          in: path
          required: true
          description: Unique identifier of the product.
          schema:
            type: string
      responses:
        '200':
          description: OK. Product details.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Product'
        '404':
          description: Not Found. Product does not exist.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /categories:
    get:
      summary: List all categories
      description: Returns all product categories available in the catalog.
      operationId: listCategories
      tags:
        - categories
      responses:
        '200':
          description: OK. List of categories.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Category'
